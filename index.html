
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#f4f4f4}
header{padding:16px;font-size:20px;font-weight:700;text-align:center;background:#fff;border-bottom:1px solid #ddd}
.container{padding:16px;margin-bottom:80px}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #ddd}
.tab{flex:1;padding:12px;text-align:center;color:#666}
.tab.active{color:#0a84ff;font-weight:700}
</style>
</head>
<body>

<header>Habit Tracker</header>
<div class="container" id="content"></div>

<div class="tabs">
<div class="tab" onclick="showToday()">Log</div>
<div class="tab" onclick="showProgress()">Progress</div>
<div class="tab" onclick="showLife()">Life</div>
<div class="tab" onclick="showSettings()">Settings</div>
</div>

<script src="app.js"></script>
</body>
</html>
